    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/home.js"></script>

<body>
    <section id="banner-section">
        <img src="https://clabrgsa.blob.core.windows.net/public/microsoft-azure-blob-storage-logo.png" alt="" srcset="">
        <h1>Welcome to the Azure Blob Storage Client Library for Python Demo</h1>
        
    </section>
    <section id="form-section">
        <form action="" method="post" enctype="multipart/form-data">
            <input type="file" name="file" id="input-file">
            <button type="submit" id="btn-upload">Upload Blob</button>
        </form>
    </section>
    <section id="list-section">
        <table>

                <tr>
                    <th>Blob Name</th>
                    <th>Size (Bytes)</th>
                    <th>Last Modified</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="blob-table-body">

                        <button class="btn-delete">Delete</button>
                    </td>
                </tr>

            </tbody>
        </table>
